<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Students CRUD</title>
    <link rel="icon" href="graduating-student.png" />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>

  <body>
    <div class="app">
      <div class="card">
        <div class="topbar">
          <div>
            <h1>Students CRUD Demo</h1>
            <div class="muted">
              Simulated students data built from a public API response
            </div>
          </div>

          <div class="row">
            <button class="secondary" id="btnReload">Reload</button>
          </div>
        </div>

        <div class="grid">
          <section class="card card-padding">
            <strong>Add New Student</strong>

            <label for="addName">Full Name</label>
            <input
              id="addName"
              type="text"
              maxlength="100"
              placeholder="e.g., Ahmed Ali"
              required
            />

            <label for="addEmail">Email</label>
            <input
              id="addEmail"
              type="email"
              placeholder="e.g., Ali@example.com"
              maxlength="150"
              required
            />

            <label for="addMajor">Major</label>
            <select id="addMajor">
              <option value="Computer Science">Computer Science</option>
              <option value="Software Engineering">Software Engineering</option>
              <option value="Information Systems">Information Systems</option>
              <option value="Cybersecurity">Cybersecurity</option>
              <option value="Data Science">Data Science</option>
            </select>

            <label for="addGpa">GPA (0.0 - 4.0)</label>
            <input
              id="addGpa"
              type="number"
              min="0"
              max="4"
              step="0.1"
              value="3.2"
              required
            />

            <div
              class="row mt-12 justify-end"
            >
              <button class="secondary" id="btnClear">Clear</button>
              <button id="btnAdd">Create (POST)</button>
            </div>
          </section>

          <section>
            <div class="row justify-between">
              <div class="row">
                <strong>Students</strong>
                <span class="muted" id="count"></span>
              </div>

              <div class="row">
                <input
                  id="search"
                  placeholder="Search name or email…"
                  class="search-width"
                  type="search"
                />
              </div>
            </div>

            <div class="status muted hidden" id="loading">
              <div class="spinner"></div>
              <div>Loading…</div>
            </div>

            <div
              class="muted mt-10 hidden"
              id="error"
            ></div>

            <div class="list" id="list"></div>
          </section>
        </div>
      </div>
    </div>

    <div class="backdrop" id="backdrop" aria-hidden="true">
      <div class="modal" aria-modal="true" aria-labelledby="modalTitle">
        <h2 id="modalTitle">Edit Student</h2>
        <div class="muted mb-10" id="editMeta"></div>

        <label for="editName">Full Name</label>
        <input id="editName" type="text" maxlength="100" required />

        <label for="editEmail">Email</label>
        <input id="editEmail" type="email" maxlength="150" required />

        <label for="editMajor">Major</label>
        <select id="editMajor">
          <option value="Computer Science">Computer Science</option>
          <option value="Software Engineering">Software Engineering</option>
          <option value="Information Systems">Information Systems</option>
          <option value="Cybersecurity">Cybersecurity</option>
          <option value="Data Science">Data Science</option>
        </select>

        <label for="editGpa">GPA (0.0 - 4.0)</label>
        <input id="editGpa" type="number" min="0" max="4" step="0.1" required />

        <div class="row">
          <button class="secondary" id="btnCancel">Cancel</button>
          <button id="btnUpdate">Update (PUT)</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </body>
</html>
